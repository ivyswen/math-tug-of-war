name: Build App With Pake CLI

on:
  workflow_dispatch:
    inputs:
      platform:
        description: 'Platform to build'
        required: true
        default: all
        type: choice
        options:
          - all
          - windows
          - macos
          - linux

jobs:
  build:
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(
        github.event.inputs.platform == 'all' && '{"include":[{"os":"windows-latest","platform":"windows"},{"os":"macos-latest","platform":"macos"},{"os":"ubuntu-latest","platform":"linux"}]}' ||
        github.event.inputs.platform == 'windows' && '{"include":[{"os":"windows-latest","platform":"windows"}]}' ||
        github.event.inputs.platform == 'macos' && '{"include":[{"os":"macos-latest","platform":"macos"}]}' ||
        '{"include":[{"os":"ubuntu-latest","platform":"linux"}]}'
      ) }}

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Vite project
        run: npm run build

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build with Pake (Linux)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.0-dev build-essential curl wget libssl-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev
          npm run pake:linux

      - name: Build with Pake (Windows & macOS)
        if: matrix.platform != 'linux'
        run: npm run pake:build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-build
          path: |
            *.exe
            *.msi
            *.dmg
            *.app
            *.deb
            *.AppImage
